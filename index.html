  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #444;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: calc(100vh - 5.5rem);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* All slides stacked on top of each other */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      max-width: 100%;
      max-height: calc(100vh - 5.5rem);
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }

    /* Arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2rem 1.2rem;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .carousel:hover .arrow { opacity: 1; }

    .arrow::before {
      content: '';
      display: block;
      width: 11px;
      height: 11px;
      border-top: 1px solid rgba(255,255,255,0.45);
      border-right: 1px solid rgba(255,255,255,0.45);
      transition: border-color 0.2s;
    }

    .arrow:hover::before { border-color: rgba(255,255,255,0.85); }
    .arrow.prev { left: 0; }
    .arrow.prev::before { transform: rotate(-135deg); }
    .arrow.next { right: 0; }
    .arrow.next::before { transform: rotate(45deg); }

    /* Footer — fixed bottom left */
    footer {
      position: fixed;
      bottom: 1.4rem;
      left: 1.6rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.6rem;
      z-index: 20;
    }

    footer a {
      display: flex;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--fg); }

    footer a svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .copyright {
      font-family: 'Georgia', serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
  </style>
</head>

  <script>
    const container = document.getElementById('slides');
    const INTERVAL  = 15000;

    // Shuffle
    const slides = Array.from(container.querySelectorAll('.slide'));
    for (let i = slides.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      container.appendChild(slides[j]);
      [slides[i], slides[j]] = [slides[j], slides[i]];
    }

    let current = 0;
    let timer;

    function goTo(index) {
      slides[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(next, INTERVAL);
    }

    document.querySelector('.arrow.next').addEventListener('click', () => { next(); startTimer(); });
    document.querySelector('.arrow.prev').addEventListener('click', () => { prev(); startTimer(); });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { next(); startTimer(); }
      if (e.key === 'ArrowLeft')  { prev(); startTimer(); }
    });

    goTo(0);
    startTimer();
  </script>
